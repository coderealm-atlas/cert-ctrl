---
- name: Build and package on macOS
  hosts: build_macos
  vars_files:
    - ../vars.yml
  roles:
    - install_service_build
    - install_service_package_posix

- name: Build and package on FreeBSD
  hosts: build_freebsd
  vars_files:
    - ../vars.yml
  roles:
    - install_service_build
    - install_service_package_posix

- name: Build and package on Windows
  hosts: build_windows
  gather_facts: false
  vars_files:
    - ../vars.yml
  roles:
    - install_service_build
    - install_service_package_windows

- name: Build and package Linux (Docker)
  hosts: build_linux_docker
  vars_files:
    - ../vars.yml
  pre_tasks:
    - name: Determine linux-docker variant selector
      set_fact:
        install_service_linux_docker_variant_effective: "{{ (install_service_linux_docker_variant | default('both')) | lower }}"

    - name: Fail on invalid linux-docker variant selector
      when: install_service_linux_docker_variant_effective not in ['both', 'ubuntu', 'alpine']
      fail:
        msg: "install_service_linux_docker_variant must be one of: both, ubuntu, alpine"

    - name: Select effective linux-docker jobs
      set_fact:
        install_service_linux_docker_jobs_effective: >-
          {{
            (install_service_linux_docker_variant_effective == 'ubuntu')
            | ternary(
              (
                (
                  install_service_linux_docker_jobs
                  | selectattr('script', 'defined')
                  | selectattr('script', 'search', 'build-ubuntu-docker.sh')
                  | list
                )
                | default([])
                | ternary(
                  (
                    install_service_linux_docker_jobs
                    | selectattr('script', 'defined')
                    | selectattr('script', 'search', 'build-ubuntu-docker.sh')
                    | list
                  ),
                  (
                    install_service_linux_docker_jobs
                    | selectattr('name', 'defined')
                    | selectattr('name', 'equalto', 'linux-x64')
                    | list
                  )
                )
              ),
              (install_service_linux_docker_variant_effective == 'alpine')
              | ternary(
                (
                  (
                    install_service_linux_docker_jobs
                    | selectattr('script', 'defined')
                    | selectattr('script', 'search', 'build-alpine-docker.sh')
                    | list
                  )
                  | default([])
                  | ternary(
                    (
                      install_service_linux_docker_jobs
                      | selectattr('script', 'defined')
                      | selectattr('script', 'search', 'build-alpine-docker.sh')
                      | list
                    ),
                    (
                      install_service_linux_docker_jobs
                      | selectattr('name', 'defined')
                      | selectattr('name', 'equalto', 'linux-musl-x64')
                      | list
                    )
                  )
                ),
                install_service_linux_docker_jobs
              )
            )
          }}

    - name: Fail when selected linux-docker variant yields no jobs
      when:
        - install_service_linux_docker_variant_effective in ['ubuntu', 'alpine']
        - (install_service_linux_docker_jobs_effective | length) == 0
      fail:
        msg: >-
          No linux-docker jobs match variant={{ install_service_linux_docker_variant_effective }}.
          Check install_service_linux_docker_jobs definitions.
          Available job scripts: {{ (install_service_linux_docker_jobs | map(attribute='script') | list) | default([]) }}
          Available job names: {{ (install_service_linux_docker_jobs | map(attribute='name') | list) | default([]) }}

    - name: Use separate aggregated build log per linux-docker variant
      when: install_service_linux_docker_variant_effective in ['ubuntu', 'alpine']
      set_fact:
        install_service_build_log_path_posix: "/tmp/install-service-build-{{ install_service_linux_docker_variant_effective }}.log"

    - name: Reset build commands from effective linux-docker jobs
      set_fact:
        install_service_build_commands: []

    - name: Build effective linux-docker build command list
      set_fact:
        install_service_build_commands: "{{ install_service_build_commands + ['BUILD_TARGET=cert_ctrl ' ~ item.script ~ ' ' ~ item.preset] }}"
      loop: "{{ install_service_linux_docker_jobs_effective }}"

    - name: Ensure rsync is available (Docker host)
      command: rsync --version
      changed_when: false

    - name: Determine controller repo root (Docker host)
      shell: |
        set -eu
        cd "{{ playbook_dir }}/../../.."
        pwd -P
      register: install_service_controller_repo_root
      changed_when: false

    - name: Sync controller repo into build repo path (Docker host)
      shell: |
        set -eu
        src="{{ install_service_controller_repo_root.stdout | trim }}"
        dst="{{ install_service_repo_path }}"
        if [ -z "$dst" ] || [ "$dst" = "/" ]; then
          echo "refusing to sync into an unsafe destination: '$dst'" >&2
          exit 2
        fi
        mkdir -p "$dst"
        # Keep .git so git-describe works, but avoid copying build outputs.
        rsync -a --delete \
          --exclude 'build/' \
          --exclude 'install/' \
          --exclude '.cache/' \
          --exclude '.vscode/' \
          --exclude '.idea/' \
          --exclude 'out/' \
          --exclude 'dist/' \
          --exclude '.git/index.lock' \
          "$src/" "$dst/"
      changed_when: false

    - name: Disable git network operations and forced checkouts for linux-docker builds
      # We just synced a working tree. Avoid any git pull/fetch/checkout in the build role,
      # which could hang behind proxies or discard local changes.
      set_fact:
        install_service_skip_git_pull: true
        install_service_skip_git_fetch_tags: true
        install_service_checkout_release_ref: false

    - name: Report proxy environment for linux-docker (masked)
      shell: |
        set -eu
        if env | grep -i proxy >/dev/null 2>&1; then
          env | grep -i proxy | sort | sed -E 's#(://)[^/@]*@#\1***@#g'
        else
          echo "(no proxy env vars found)"
        fi
      changed_when: false
      environment: "{{ install_service_proxy_env | default({}) }}"

    - name: Preflight connectivity to GitHub (curl)
      shell: |
        set -eu
        url="https://github.com"
        # Fail fast on proxy/DNS/TLS issues before starting a long build.
        curl -fsSIL --max-time 15 "$url" >/dev/null
        # Print a small proof line without being too verbose.
        code="$(curl -sSIL --max-time 15 -o /dev/null -w '%{http_code}' "$url" || true)"
        echo "curl_ok url=$url http_code=${code:-unknown}"
      changed_when: false
      environment: "{{ install_service_proxy_env | default({}) }}"

    - name: Determine release version on Docker build host
      when: install_service_release_version | length == 0
      shell: |
        set -eu
        cd "{{ install_service_repo_path }}"
        describe=$(git describe --tags --long --dirty --abbrev=8 --match "v[0-9]*.[0-9]*.[0-9]*" --exclude "*-*" 2>/dev/null || true)
        if [ -n "$describe" ]; then
          tag="$describe"
        else
          short_sha=$(git rev-parse --short HEAD 2>/dev/null || true)
          commit_count=$(git rev-list --count HEAD 2>/dev/null || true)
          if [ -n "$short_sha" ] && [ -n "$commit_count" ]; then
            tag="v0.0.${commit_count}-${short_sha}"
            if ! git diff --quiet HEAD 2>/dev/null; then
              tag="${tag}-dirty"
            fi
          fi
        fi
        if [ -z "${tag:-}" ]; then
          tag="v0.0.0-unknown"
        fi
        if [ "{{ install_service_force_clean_git_describe | default(false) | bool | lower }}" = "true" ]; then
          tag=$(printf '%s' "$tag" | sed -E 's/-dirty$//')
        fi
        printf '%s\n' "$tag"
      register: install_service_release_version_cmd
      changed_when: false

    - name: Set release version from git describe (Docker host)
      when: install_service_release_version | length == 0
      set_fact:
        install_service_release_version: "{{ install_service_release_version_cmd.stdout | trim }}"

    - name: Detect stale local install prefixes (build-info mismatch)
      shell: |
        set -eu
        manifest="{{ install_service_repo_path }}/{{ docker_job.install_prefix }}/build-info.json"
        expected="{{ install_service_release_version | trim }}"
        if [ ! -f "$manifest" ]; then
          exit 2
        fi
        if command -v python3 >/dev/null 2>&1; then
          actual=$(python3 -c 'import json,sys; print((json.load(open(sys.argv[1])) or {}).get("git_describe",""))' "$manifest" 2>/dev/null || true)
        else
          actual=$(sed -n 's/.*"git_describe"[[:space:]]*:[[:space:]]*"\([^"\\]*\)".*/\1/p' "$manifest" | head -n1 || true)
        fi
        if [ -z "$actual" ]; then
          exit 3
        fi
        if [ "$actual" != "$expected" ]; then
          exit 4
        fi
      args:
        chdir: "{{ install_service_repo_path }}"
      loop: "{{ install_service_linux_docker_jobs_effective }}"
      loop_control:
        loop_var: docker_job
      register: install_service_prefix_freshness
      changed_when: false
      failed_when: false

    - name: Force rebuild when local install prefix is stale
      when: >-
        (install_service_prefix_freshness is defined)
        and ((install_service_prefix_freshness.results | selectattr('rc', 'ne', 0) | list | length) > 0)
      set_fact:
        install_service_force_build: true

  roles:
    - install_service_build
  tasks:
    - name: Package Linux Docker artifacts
      include_role:
        name: install_service_package_posix
      vars:
        install_service_install_prefix: "{{ install_service_repo_path }}/{{ docker_job.install_prefix }}"
        install_service_asset_name: "{{ docker_job.asset_name }}"
        install_service_archive_ext: .tar.gz
      loop: "{{ install_service_linux_docker_jobs_effective }}"
      loop_control:
        loop_var: docker_job
